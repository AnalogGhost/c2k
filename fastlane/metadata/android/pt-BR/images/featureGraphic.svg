<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">

  <!-- Background -->
  <rect width="1024" height="500" fill="#FF6B35"/>

  <!-- Running figure — scaled 3.5x from the 108dp icon, centered at ~(230, 250) -->
  <g transform="translate(30, 73) scale(3.5)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="50" cy="26" r="8" fill="white"/>
    <!-- Torso -->
    <path d="M52,34 L60,57" fill="none" stroke="white" stroke-width="8"/>
    <!-- Back arm -->
    <path d="M50,43 L33,31" fill="none" stroke="white" stroke-width="7"/>
    <!-- Forward arm -->
    <path d="M53,42 L70,55" fill="none" stroke="white" stroke-width="7"/>
    <!-- Forward leg -->
    <path d="M60,57 L72,73 L82,83" fill="none" stroke="white" stroke-width="8"/>
    <!-- Back leg -->
    <path d="M58,57 L46,71 L32,64" fill="none" stroke="white" stroke-width="8"/>
  </g>

  <!-- Wordmark -->
  <text x="700" y="230"
        font-family="sans-serif" font-weight="900" font-size="170"
        fill="white" text-anchor="middle" dominant-baseline="middle">C2K</text>

  <!-- Subtitle -->
  <text x="700" y="335"
        font-family="sans-serif" font-weight="400" font-size="40"
        fill="white" fill-opacity="0.9" text-anchor="middle">Couch to 5K &amp; 10K</text>

  <!-- Tagline -->
  <text x="700" y="400"
        font-family="sans-serif" font-size="26"
        fill="white" fill-opacity="0.65" text-anchor="middle">Free · Open Source · No Tracking</text>

</svg>
