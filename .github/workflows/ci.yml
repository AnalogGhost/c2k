name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run unit tests
        run: ./gradlew testFossDebugUnitTest --console=plain

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testFossDebugUnitTest/

  reproducible-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle Docker dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle-docker
          key: gradle-docker-${{ hashFiles('gradle/libs.versions.toml', 'app/build.gradle.kts', 'build.gradle.kts') }}
          restore-keys: gradle-docker-

      - name: First build
        run: bash docker-build.sh

      - name: Save first build artifact
        run: sudo cp app/build/outputs/apk/foss/release/app-foss-release-unsigned.apk /tmp/build1.apk

      - name: Second build
        run: bash docker-build.sh

      - name: Compare build hashes
        run: |
          h1=$(sudo sha256sum /tmp/build1.apk | cut -d' ' -f1)
          h2=$(sudo sha256sum app/build/outputs/apk/foss/release/app-foss-release-unsigned.apk | cut -d' ' -f1)
          echo "Build 1: $h1"
          echo "Build 2: $h2"
          if [ "$h1" != "$h2" ]; then
            echo "::error::Build is not reproducible — two clean builds of the same commit produced different output."
            exit 1
          fi
          echo "Build is reproducible."
